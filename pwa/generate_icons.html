<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>NaijaFactCheck — Generate Icons</title>
<style>
  body { font-family: monospace; background: #0a0a0a; color: #f0f0f0;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; gap: 20px; }
  h2 { color: #00e676; }
  p  { color: #666; font-size: 13px; }
  button { padding: 12px 28px; background: #00e676; color: #000;
           font-weight: bold; border: none; border-radius: 8px;
           cursor: pointer; font-size: 14px; }
  canvas { border: 1px solid #222; border-radius: 8px; }
  .row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
</style>
</head>
<body>
<h2>NaijaFactCheck — Icon Generator</h2>
<p>Click the button to generate and download both icons into the <b>icons/</b> folder.</p>

<div class="row">
  <div>
    <p style="text-align:center">192×192</p>
    <canvas id="c192" width="192" height="192"></canvas>
  </div>
  <div>
    <p style="text-align:center">512×512</p>
    <canvas id="c512" width="512" height="512"></canvas>
  </div>
</div>

<button onclick="generateAndDownload()">Generate & Download Icons</button>
<p id="status"></p>

<script>
function drawIcon(canvas, size) {
  const ctx  = canvas.getContext("2d");
  const cx   = size / 2;
  const cy   = size / 2;
  const pad  = size * 0.08;

  // Background
  ctx.fillStyle = "#0a0a0a";
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // Green circle
  ctx.fillStyle = "#00e676";
  ctx.beginPath();
  ctx.arc(cx, cy - size * 0.04, size * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // Magnifying glass handle
  ctx.strokeStyle = "#00e676";
  ctx.lineWidth   = size * 0.08;
  ctx.lineCap     = "round";
  ctx.beginPath();
  ctx.moveTo(cx + size * 0.18, cy + size * 0.18);
  ctx.lineTo(cx + size * 0.34, cy + size * 0.34);
  ctx.stroke();

  // Inner circle (cutout)
  ctx.fillStyle   = "#0a0a0a";
  ctx.beginPath();
  ctx.arc(cx, cy - size * 0.04, size * 0.2, 0, Math.PI * 2);
  ctx.fill();

  // N initial
  ctx.fillStyle   = "#00e676";
  ctx.font        = `bold ${size * 0.2}px Syne, Arial`;
  ctx.textAlign   = "center";
  ctx.textBaseline= "middle";
  ctx.fillText("N", cx, cy - size * 0.04);

  // Bottom text
  ctx.fillStyle   = "#666666";
  ctx.font        = `${size * 0.065}px monospace`;
  ctx.textAlign   = "center";
  ctx.textBaseline= "bottom";
  ctx.fillText("FACT CHECK", cx, size - pad);
}

function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}

async function generateAndDownload() {
  const c192 = document.getElementById("c192");
  const c512 = document.getElementById("c512");

  drawIcon(c192, 192);
  drawIcon(c512, 512);

  const blob192 = await canvasToBlob(c192);
  const blob512 = await canvasToBlob(c512);

  const dl = (blob, name) => {
    const a    = document.createElement("a");
    a.href     = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  dl(blob192, "icon-192.png");
  setTimeout(() => dl(blob512, "icon-512.png"), 500);

  document.getElementById("status").textContent =
    "✅ Both icons downloaded. Move them into the pwa/icons/ folder.";
}

// Preview on load
window.onload = () => {
  drawIcon(document.getElementById("c192"), 192);
  drawIcon(document.getElementById("c512"), 512);
};
</script>
</body>
</html>
